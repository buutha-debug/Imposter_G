<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>IMPOSTER_WOLF_PROTOCOL</title>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --panel-bg: #141416;
            --border-color: #26262b;
            --accent-red: #ff3333;
            --accent-blue: #38bdf8;
            --accent-orange: #f97316;
            --accent-green: #22c55e;
            --text-main: #e4e4e7;
            --text-dim: #71717a;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            padding-top: calc(15px + env(safe-area-inset-top));
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        .screen {
            display: none;
            width: 100%;
            max-width: 400px;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .screen.active { display: flex; }

        .content-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
        }

        h2 {
            font-size: 1.2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin: 0 0 10px 0;
            color: #fff;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
            width: 100%;
            flex-shrink: 0;
        }

        .input-group {
            width: 100%;
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        input {
            flex: 1;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        button {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        button:active {
            background: var(--text-main);
            color: var(--bg-dark);
        }

        .add-word-trigger-btn {
            width: 100%;
            background: var(--accent-green);
            border: 1px solid var(--accent-green);
            color: #000;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 6px;
            margin-bottom: 8px;
            flex-shrink: 0;
            text-align: center;
        }

        .add-word-trigger-btn:active {
            background: #fff;
            color: #000;
        }

        .primary-btn {
            background: var(--accent-red);
            border-color: var(--accent-red);
            color: #fff;
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            letter-spacing: 1px;
            margin-top: 8px;
            flex-shrink: 0;
            border-radius: 6px;
        }

        .list-container {
            width: 100%;
            background: rgba(20, 20, 22, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px;
            overflow-y: auto;
            margin-bottom: 8px;
        }
        
        #players-list {
            height: 70px;
            flex-shrink: 0;
        }

        #words-management-list {
            flex-grow: 1;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 0.8rem;
            color: var(--text-dim);
            border-bottom: 1px solid rgba(38, 38, 43, 0.2);
        }

        .word-actions button {
            padding: 2px 6px;
            font-size: 0.7rem;
            margin-left: 2px;
        }

        .edit-btn { border-color: var(--accent-blue); color: var(--accent-blue); }
        .del-btn { border-color: var(--accent-red); color: var(--accent-red); }

        /* تعديل كرت اللاعب ليكون بالمنتصف تماماً */
        .card-container {
            perspective: 1000px;
            width: 280px;
            height: 320px;
            margin: auto; /* التمركز التلقائي في وسط المساحة المتاحة عمودياً وأفقياً */
            display: block;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            left: 0;
            top: 0;
        }

        .card-front { background: var(--panel-bg); }
        .card-back {
            background: #1c1c1f;
            transform: rotateY(180deg);
            border-color: var(--accent-orange);
        }

        .player-name { font-size: 1.6rem; font-weight: 900; color: #fff; }
        .card-instruction { font-size: 0.7rem; color: var(--text-dim); margin-top: 12px; text-align: center; }
        
        /* الختم */
        .seal-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .seal-btn {
            background: var(--accent-orange);
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 0.9rem;
            border-radius: 50px;
            box-shadow: 0 0 12px rgba(249, 115, 22, 0.3);
        }

        .secret-content {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .secret-word { font-size: 1.6rem; font-weight: 900; color: var(--accent-red); text-align: center; line-height: 1.3; }
        .hint-text { font-size: 1rem; color: #fff; margin-top: 10px; text-align: center; background: #26262b; padding: 6px 12px; border-radius: 6px; width: 100%; }

        #timer-display {
            font-size: 4rem;
            font-weight: 900;
            font-family: monospace;
            color: #fff;
            margin: auto 0;
        }
    </style>
</head>
<body>

    <!-- الشاشة 1: التجهيز -->
    <div id="setup-screen" class="screen active">
        <h2>إعدادات العملية</h2>
        
        <div class="content-wrapper">
            <div class="input-group">
                <input type="text" id="player-input" placeholder="اسم اللاعب...">
                <button onclick="addPlayer()">إضافة لاعب</button>
            </div>
            <div class="list-container" id="players-list"></div>

            <div class="input-group">
                <input type="text" id="word-input" placeholder="الكلمة الجديدة...">
                <input type="text" id="hint-input" placeholder="التلميح...">
            </div>
            <button class="add-word-trigger-btn" onclick="addOrUpdateWord()" id="add-word-btn">+ حفظ الكلمة باللائحة</button>
            
            <div class="list-container" id="words-management-list"></div>
        </div>

        <button class="primary-btn" onclick="startGame()">بدء الاختراق</button>
    </div>

    <!-- الشاشة 2: توزيع الأدوار -->
    <div id="game-screen" class="screen">
        <h2 id="turn-title">دور اللاعب</h2>
        
        <!-- تعديل الحاوية هنا لضمان محاذاة عناصر الكرت في المنتصف بالكامل -->
        <div class="content-wrapper" style="justify-content: center; align-items: center;">
            <div class="card-container" id="card-trigger">
                <div class="card" id="main-card">
                    <div class="card-face card-front" onclick="flipCard()">
                        <div class="player-name" id="card-player-name">اسم اللاعب</div>
                        <div class="card-instruction">اضغط لقلب الكرت</div>
                    </div>
                    <div class="card-face card-back">
                        <div id="seal-container" class="seal-screen">
                            <div style="color: var(--accent-orange); margin-bottom: 12px; font-size: 0.8rem; font-weight: bold;">[ الرسالة مختومة أمنياً ]</div>
                            <button class="seal-btn" onclick="breakSeal()">كسر الختم وقراءة السر</button>
                        </div>
                        <div id="secret-container" class="secret-content">
                            <div class="secret-word" id="card-secret">الكلمة</div>
                            <div class="hint-text" id="card-hint" style="display: none;">التلميح: ...</div>
                            <div class="card-instruction" style="color: var(--accent-orange);">تم فتح الختم. مرر الهاتف بحذر.</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button class="primary-btn" id="next-btn" onclick="nextPlayer()" style="display: none;">اللاعب التالي</button>
    </div>

    <!-- الشاشة 3: العداد والمناقشة -->
    <div id="timer-screen" class="screen">
        <h2>وقت التصفية والمناقشة</h2>
        
        <div class="content-wrapper" style="justify-content: center; align-items: center;">
            <div id="timer-display">05:00</div>
            <div style="color: var(--text-dim); text-align: center; font-size: 0.85rem;">ابحثوا عن الـ Imposter (الذئب) قبل نهاية الوقت.</div>
        </div>
        
        <button class="primary-btn" onclick="resetToSetup()">إعادة تشغيل النظام</button>
    </div>

    <script>
        let wordDatabase = [
            {word: "طائرة", hint: "وسيلة نقل"}, {word: "قطار", hint: "وسيلة نقل"},
            {word: "تفاحة", hint: "فاكهة"}, {word: "موز", hint: "فاكهة"},
            {word: "أسد", hint: "حيوان مفترس"}, {word: "نمر", hint: "حيوان مفترس"},
            {word: "قهوة", hint: "مشروب ساخن"}, {word: "شاي", hint: "مشروب ساخن"},
            {word: "سيف", hint: "سلاح قديم"}, {word: "قوس", hint: "سلاح قديم"},
            {word: "طبيب", hint: "مهنة"}, {word: "مهندس", hint: "مهنة"},
            {word: "مستشفى", hint: "مكان عام"}, {word: "مدرسة", hint: "مكان عام"},
            {word: "ذهب", hint: "معدن ثمين"}, {word: "الماس", hint: "معدن ثمين"},
            {word: "برج إيفل", hint: "معلم سياحي"}, {word: "الأهرامات", hint: "معلم سياحي"},
            {word: "كرة القدم", hint: "رياضة شعبية"}, {word: "كرة السلة", hint: "رياضة شعبية"}
        ];

        let players = [];
        let imposterIndex = -1;
        let currentWordPair = {};
        let currentPlayerTurn = 0;
        let countdownTimer;
        let editingIndex = -1;
        let isSealBroken = false;

        window.onload = function() {
            renderWords();
        };

        function addPlayer() {
            const pInput = document.getElementById('player-input');
            const name = pInput.value.trim();
            if(name && !players.includes(name)) {
                players.push(name);
                pInput.value = '';
                renderPlayers();
            }
        }

        function renderPlayers() {
            const list = document.getElementById('players-list');
            list.innerHTML = players.map(p => `<div class="list-item"><span>${p}</span></div>`).join('');
        }

        function renderWords() {
            const list = document.getElementById('words-management-list');
            list.innerHTML = wordDatabase.map((item, index) => `
                <div class="list-item">
                    <span>${item.word} (${item.hint})</span>
                    <div class="word-actions">
                        <button class="edit-btn" onclick="editWord(${index})">تعديل</button>
                        <button class="del-btn" onclick="deleteWord(${index})">حذف</button>
                    </div>
                </div>
            `).join('');
        }

        function addOrUpdateWord() {
            const wInput = document.getElementById('word-input');
            const hInput = document.getElementById('hint-input');
            const word = wInput.value.trim();
            const hint = hInput.value.trim();

            if (word && hint) {
                if (editingIndex > -1) {
                    wordDatabase[editingIndex] = { word: word, hint: hint };
                    editingIndex = -1;
                    const btn = document.getElementById('add-word-btn');
                    btn.innerText = "+ حفظ الكلمة باللائحة";
                    btn.style.background = "var(--accent-green)";
                    btn.style.color = "#000";
                } else {
                    wordDatabase.push({ word: word, hint: hint });
                }
                wInput.value = '';
                hInput.value = '';
                renderWords();
            }
        }

        function editWord(index) {
            editingIndex = index;
            document.getElementById('word-input').value = wordDatabase[index].word;
            document.getElementById('hint-input').value = wordDatabase[index].hint;
            const btn = document.getElementById('add-word-btn');
            btn.innerText = "تحديث الكلمة الآن";
            btn.style.background = "var(--accent-orange)";
            btn.style.color = "#fff";
        }

        function deleteWord(index) {
            if(wordDatabase.length <= 1) {
                alert("يجب إبقاء كلمة واحدة في النظام.");
                return;
            }
            wordDatabase.splice(index, 1);
            renderWords();
        }

        function startGame() {
            if(players.length < 3) {
                alert("العملية تتطلب 3 لاعبين على الأقل.");
                return;
            }
            imposterIndex = Math.floor(Math.random() * players.length);
            currentWordPair = wordDatabase[Math.floor(Math.random() * wordDatabase.length)];
            currentPlayerTurn = 0;
            showScreen('game-screen');
            setupPlayerTurn();
        }

        function setupPlayerTurn() {
            isSealBroken = false;
            document.getElementById('main-card').classList.remove('flipped');
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('seal-container').style.display = 'flex';
            document.getElementById('secret-container').style.display = 'none';
            
            document.getElementById('turn-title').innerText = `دور: ${players[currentPlayerTurn]}`;
            document.getElementById('card-player-name').innerText = players[currentPlayerTurn];

            const secretDisplay = document.getElementById('card-secret');
            const hintDisplay = document.getElementById('card-hint');

            if(currentPlayerTurn === imposterIndex) {
                secretDisplay.innerText = "أنت الـ IMPOSTER\n(الذئب)";
                hintDisplay.innerText = `التلميح: ${currentWordPair.hint}`;
                hintDisplay.style.display = 'block';
            } else {
                secretDisplay.innerText = currentWordPair.word;
                hintDisplay.innerText = '';
                hintDisplay.style.display = 'none';
            }
        }

        function flipCard() {
            if (!isSealBroken) {
                document.getElementById('main-card').classList.add('flipped');
                if(navigator.vibrate) navigator.vibrate(30);
            }
        }

        function breakSeal() {
            isSealBroken = true;
            document.getElementById('seal-container').style.display = 'none';
            document.getElementById('secret-container').style.display = 'flex';
            document.getElementById('next-btn').style.display = 'block';
            if(navigator.vibrate) navigator.vibrate([50, 100]);
        }

        function nextPlayer() {
            currentPlayerTurn++;
            if(currentPlayerTurn < players.length) {
                setupPlayerTurn();
            } else {
                showScreen('timer-screen');
                startTimer(5 * 60);
            }
        }

        function startTimer(duration) {
            let timer = duration, minutes, seconds;
            const display = document.getElementById('timer-display');
            
            clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                minutes = parseInt(timer / 60, 10);
                seconds = parseInt(timer % 60, 10);

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                display.innerText = minutes + ":" + seconds;

                if (--timer < 0) {
                    clearInterval(countdownTimer);
                    display.innerText = "انتهى الوقت";
                    if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
                }
            }, 1000);
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function resetToSetup() {
            clearInterval(countdownTimer);
            showScreen('setup-screen');
            renderWords();
        }
    </script>
</body>
</html>
